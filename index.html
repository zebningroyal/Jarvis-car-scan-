<script>
    // System Config
    // This connects to the "VITE_API_KEY" you are saving in Vercel right now
    const apiKey = AIzaSyDbCKD-nwFq7MCwrvUx_1QUzE-Y-kZglYE 
    
    // Using the stable Gemini 1.5 Flash model
    const modelId = "gemini-1.5-flash"; 
    const bossName = "Shazeb";
    const userName = "Memo";

    const ui = {
        pdf: document.getElementById('pdf-input'),
        img: document.getElementById('img-input'),
        pdfLabel: document.getElementById('pdf-label'),
        imgLabel: document.getElementById('img-label'),
        manual: document.getElementById('manual-data'),
        trigger: document.getElementById('analyze-trigger'),
        stageUpload: document.getElementById('upload-stage'),
        stageProcessing: document.getElementById('processing-stage'),
        stageResults: document.getElementById('results-stage'),
        status: document.getElementById('status-update'),
        output: document.getElementById('diagnosis-text'),
        previewBox: document.getElementById('preview-box'),
        resultImg: document.getElementById('result-img'),
        ttsBtn: document.getElementById('tts-trigger'),
        chatInput: document.getElementById('chat-query'),
        chatBtn: document.getElementById('chat-submit'),
        resetBtn: document.getElementById('start-over'),
        errorModal: document.getElementById('error-modal'),
        errorText: document.getElementById('error-text')
    };

    let currentReport = "";

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    ui.pdf.onchange = () => { if(ui.pdf.files[0]) ui.pdfLabel.innerText = ui.pdf.files[0].name; };
    ui.img.onchange = () => { if(ui.img.files[0]) ui.imgLabel.innerText = "IMAGE READY"; };
    ui.resetBtn.onclick = () => location.reload();

    ui.trigger.onclick = async () => {
        const hasPdf = ui.pdf.files[0];
        const hasImg = ui.img.files[0];
        const hasText = ui.manual.value.trim();

        // Safety check to ensure the key exists
        if (!apiKey) {
            showError("Boss, the VITE_API_KEY is missing from Vercel. Please redeploy after adding it.");
            return;
        }

        if (!hasPdf && !hasImg && !hasText) {
            showError("Boss, I need data to analyze. Please provide a file or text.");
            return;
        }

        transitionTo('processing');

        try {
            let context = hasText;
            let imageData = null;

            if (hasPdf) {
                ui.status.innerText = "Extracting technical data from PDF...";
                context = await extractPdfText(hasPdf);
            } else if (hasImg) {
                ui.status.innerText = "Processing visual diagnostics...";
                imageData = await fileToBase64(hasImg);
                ui.resultImg.src = URL.createObjectURL(hasImg);
                ui.previewBox.classList.remove('hidden');
            }

            ui.status.innerText = "Establishing neural link with Gemini...";
            const response = await fetchWithRetry(context, imageData);
            
            currentReport = response;
            renderReport(response);
            transitionTo('results');
            
        } catch (err) {
            showError(`Diagnostic Failure: ${err.message}`);
            transitionTo('upload');
        }
    };

    async function fetchWithRetry(text, base64, retries = 3) {
        const systemPrompt = `You are JARVIS, an advanced AI Assistant for Boss ${bossName}.
        Developed by Shazeb Labs.
        Greeting: "Assalamualikum Boss ${bossName}, I have finished the scan of the data provided by ${userName}."
        Tone: Professional, technical, Jarvis-style.
        Structure: 1. Diagnosis 2. Severity 3. Estimated Fix 4. Next Steps.`;

        const payload = {
            contents: [{
                parts: [{ text: systemPrompt + "\n\nDATA:\n" + (text || "IMAGE ANALYSIS") }]
            }]
        };

        if (base64) {
            payload.contents[0].parts.push({
                inlineData: { mimeType: "image/jpeg", data: base64 }
            });
        }

        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`Status ${response.status}`);
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "No analysis generated.";
            } catch (err) {
                if (i === retries - 1) throw err;
                await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
            }
        }
    }

    async function extractPdfText(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(s => s.str).join(" ") + " ";
        }
        return text;
    }

    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
        });
    }

    function renderReport(text) {
        ui.output.innerHTML = text
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<strong class="text-sky-400">$1</strong>')
            .replace(/### (.*?)/g, '<h4 class="text-white font-bold mt-4">$1</h4>');
    }

    function transitionTo(stage) {
        ui.stageUpload.classList.add('hidden');
        ui.stageProcessing.classList.add('hidden');
        ui.stageResults.classList.add('hidden');
        if (stage === 'upload') ui.stageUpload.classList.remove('hidden');
        if (stage === 'processing') ui.stageProcessing.classList.remove('hidden');
        if (stage === 'results') ui.stageResults.classList.remove('hidden');
    }

    function showError(msg) {
        ui.errorText.innerText = msg;
        ui.errorModal.classList.remove('hidden');
    }
</script>
