<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Car Scan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .jarvis-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .glow-button { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .glow-button:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(59, 130, 246, 0.6); }
        .loader { border-top-color: #60a5fa; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .scanner-line { width: 100%; height: 2px; background: #3b82f6; box-shadow: 0 0 10px #3b82f6; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { transform: translateY(-20px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(60px); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="max-w-xl mx-auto px-4 pt-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-blue-400">JARVIS <span class="text-white">v2.1</span></h1>
                <p class="text-slate-400 text-sm">AI Car Diagnostic Lab</p>
            </div>
            <div class="h-12 w-12 rounded-full bg-blue-500/20 border border-blue-500/50 flex items-center justify-center animate-pulse">
                <div class="h-6 w-6 rounded-full bg-blue-400"></div>
            </div>
        </div>

        <div class="jarvis-card rounded-3xl p-6 shadow-2xl mb-6">
            <div id="upload-section">
                <div class="text-center mb-6">
                    <p class="text-slate-300">Upload PDF Scan, Dashboard Image, or Paste Text</p>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <label for="file-input" class="flex flex-col items-center justify-center h-32 border-2 border-dashed border-blue-500/30 rounded-2xl cursor-pointer hover:bg-blue-500/5 transition-colors text-center p-2">
                        <svg class="w-8 h-8 mb-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <p class="text-xs font-semibold">Report PDF</p>
                        <input id="file-input" type="file" class="hidden" accept="application/pdf" />
                    </label>

                    <label for="image-input" class="flex flex-col items-center justify-center h-32 border-2 border-dashed border-blue-500/30 rounded-2xl cursor-pointer hover:bg-blue-500/5 transition-colors text-center p-2">
                        <svg class="w-8 h-8 mb-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <p class="text-xs font-semibold">Dashboard Photo</p>
                        <input id="image-input" type="file" class="hidden" accept="image/*" />
                    </label>
                </div>
                
                <p id="selection-status" class="text-center text-xs text-blue-300 mb-4 h-4"></p>

                <textarea id="manual-text" placeholder="Paste scan text manually..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm focus:border-blue-500 focus:outline-none h-20 text-slate-300"></textarea>
                
                <button id="analyze-btn" class="w-full mt-6 py-4 rounded-xl font-bold glow-button text-white">✨ ANALYZE WITH JARVIS</button>
            </div>

            <!-- Loading State -->
            <div id="loading" class="hidden py-10 text-center">
                <div class="loader w-12 h-12 border-4 border-slate-700 rounded-full mx-auto mb-4"></div>
                <p id="loading-msg" class="text-blue-400 font-medium italic">Connecting to Neural Network...</p>
            </div>

            <!-- Results State -->
            <div id="result-section" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-blue-400 flex items-center">
                        <span class="mr-2">🔧</span> Scan Results
                    </h2>
                    <button id="reset-btn" class="text-xs text-slate-400 hover:text-white uppercase px-3 py-1 bg-slate-800 rounded-lg">New Scan</button>
                </div>
                
                <div id="image-preview-container" class="hidden mb-4 rounded-xl overflow-hidden border border-blue-500/20">
                    <img id="analyzed-image" class="w-full h-32 object-cover" />
                </div>

                <div id="ai-output" class="text-slate-200 text-sm leading-relaxed space-y-4 p-4 bg-slate-800/40 rounded-xl border-l-4 border-blue-500 mb-4">
                </div>

                <div class="flex gap-2 mb-6">
                    <button id="tts-btn" class="flex-1 py-2 rounded-lg bg-blue-600/20 border border-blue-500/30 text-xs font-bold hover:bg-blue-600/40 transition-all flex items-center justify-center gap-2">
                        <span>🔊</span> Listen to Jarvis
                    </button>
                </div>

                <!-- Chat/Follow-up Section -->
                <div class="mt-6 border-t border-slate-800 pt-4">
                    <p class="text-xs text-slate-400 mb-2 uppercase font-bold tracking-widest">✨ Ask Jarvis Anything</p>
                    <div class="flex gap-2">
                        <input id="chat-input" type="text" placeholder="e.g. Can I fix this myself?" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
                        <button id="chat-send" class="bg-blue-600 px-4 rounded-lg hover:bg-blue-500 transition-colors">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></button>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-slate-600 text-[10px] uppercase tracking-widest">Shazeb Labs • Neural Edition</p>
    </div>

    <script>
        const apiKey = ""; 
        const fileInput = document.getElementById('file-input');
        const imageInput = document.getElementById('image-input');
        const selectionStatus = document.getElementById('selection-status');
        const manualText = document.getElementById('manual-text');
        const analyzeBtn = document.getElementById('analyze-btn');
        const uploadSection = document.getElementById('upload-section');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const aiOutput = document.getElementById('ai-output');
        const resetBtn = document.getElementById('reset-btn');
        const loadingMsg = document.getElementById('loading-msg');
        const ttsBtn = document.getElementById('tts-btn');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const analyzedImage = document.getElementById('analyzed-image');
        const imagePreviewContainer = document.getElementById('image-preview-container');

        let lastDiagnosis = "";
        let audioContext;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        fileInput.onchange = () => { if(fileInput.files[0]) selectionStatus.innerText = "PDF: " + fileInput.files[0].name; };
        imageInput.onchange = () => { if(imageInput.files[0]) selectionStatus.innerText = "Image selected for analysis"; };

        analyzeBtn.onclick = async () => {
            const pdfFile = fileInput.files[0];
            const imgFile = imageInput.files[0];
            const text = manualText.value.trim();

            if (!pdfFile && !imgFile && !text) {
                alert("Please provide a report or image first, Sir.");
                return;
            }

            uploadSection.classList.add('hidden');
            loading.classList.remove('hidden');
            loadingMsg.innerText = "Initializing Jarvis systems...";

            try {
                let context = "";
                let imageData = null;

                if (pdfFile) {
                    loadingMsg.innerText = "Scanning PDF documents...";
                    context = await extractTextFromPdf(pdfFile);
                } else if (imgFile) {
                    loadingMsg.innerText = "Processing visual scan...";
                    imageData = await fileToBase64(imgFile);
                    analyzedImage.src = URL.createObjectURL(imgFile);
                    imagePreviewContainer.classList.remove('hidden');
                } else {
                    context = text;
                }

                loadingMsg.innerText = "Running diagnostic algorithms...";
                const diagnosis = await callGeminiAnalysis(context, imageData);
                lastDiagnosis = diagnosis;
                displayResult(diagnosis);
                
            } catch (err) {
                displayResult(`<span class="text-red-400">System Error: ${err.message}</span>`);
            } finally {
                loading.classList.add('hidden');
                resultSection.classList.remove('hidden');
            }
        };

        async function extractTextFromPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ");
            }
            return fullText;
        }

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function callGeminiAnalysis(text, base64Image) {
            const systemPrompt = `You are Jarvis, a brilliant AI car mechanic. 
            Greeting: "Assalamualikum sir i am Jarvis"
            Language: Mix of technical English and common Indian English (Hinglish).
            Task: If you see an image, describe the warning lights or damage. If you see text, explain the fault codes.
            Structure:
            1. **Main Issue** (DTC codes or parts)
            2. **Severity** (Safe to drive?)
            3. **Action Required** (Mechanic visit or easy fix?)`;

            const contents = [{
                parts: [
                    { text: text ? `Analyze this scan: ${text}` : "Analyze this car dashboard/part image." }
                ]
            }];

            if (base64Image) {
                contents[0].parts.push({
                    inlineData: { mimeType: "image/jpeg", data: base64Image }
                });
            }

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: systemPrompt }] } })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "Analysis failed");
            return data.candidates[0].content.parts[0].text;
        }

        chatSend.onclick = async () => {
            const query = chatInput.value.trim();
            if (!query) return;

            const originalBtnText = chatSend.innerHTML;
            chatSend.innerHTML = "⏳";
            chatSend.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            { role: "user", parts: [{ text: `Diagnosis Context: ${lastDiagnosis}` }] },
                            { role: "user", parts: [{ text: `Question: ${query}` }] }
                        ],
                        systemInstruction: { parts: [{ text: "You are Jarvis. Answer briefly about the car issue based on the context." }] }
                    })
                });
                
                const data = await response.json();
                const answer = data.candidates[0].content.parts[0].text;
                
                const qDiv = document.createElement('div');
                qDiv.className = "mt-4 p-2 bg-blue-500/10 rounded border-l-2 border-blue-400 text-xs";
                qDiv.innerHTML = `<strong class="text-blue-400">You:</strong> ${query}<br><strong class="text-white">Jarvis:</strong> ${answer}`;
                aiOutput.appendChild(qDiv);
                chatInput.value = "";
                aiOutput.scrollTop = aiOutput.scrollHeight;
            } catch (e) {
                alert("Neural link failed.");
            } finally {
                chatSend.innerHTML = originalBtnText;
                chatSend.disabled = false;
            }
        };

        ttsBtn.onclick = async () => {
            if (!lastDiagnosis) return;
            const originalText = ttsBtn.innerHTML;
            ttsBtn.innerHTML = "⏳ Jarvis is thinking...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "gemini-2.5-flash-preview-tts",
                        contents: [{ parts: [{ text: "Say professionally and calmly: " + lastDiagnosis.substring(0, 500) }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        }
                    })
                });

                const data = await response.json();
                const pcmData = data.candidates[0].content.parts[0].inlineData.data;
                playPCM(pcmData);
            } catch (e) {
                console.error(e);
                alert("Voice synthesis failed.");
            } finally {
                ttsBtn.innerHTML = originalText;
            }
        };

        function playPCM(base64) {
            const binary = atob(base64);
            const len = binary.length;
            const bytes = new Int16Array(len / 2);
            for (let i = 0; i < len; i += 2) {
                bytes[i / 2] = binary.charCodeAt(i) | (binary.charCodeAt(i + 1) << 8);
            }
            
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            const buffer = audioContext.createBuffer(1, bytes.length, 24000);
            const channelData = buffer.getChannelData(0);
            for (let i = 0; i < bytes.length; i++) {
                channelData[i] = bytes[i] / 32768;
            }
            
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();
        }

        function displayResult(text) {
            const html = text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-blue-400 font-bold">$1</strong>');
            aiOutput.innerHTML = html;
        }

        resetBtn.onclick = () => {
            resultSection.classList.add('hidden');
            imagePreviewContainer.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            fileInput.value = "";
            imageInput.value = "";
            selectionStatus.innerText = "";
            manualText.value = "";
            lastDiagnosis = "";
        };
    </script>
</body>
</html>
