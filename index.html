<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Car Scan AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style>
body { background:#020617; color:#fff; font-family:Poppins; }
.glow { background:#2563eb; padding:12px; border-radius:10px; }
.loader { border:4px solid #333; border-top:4px solid #3b82f6; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;}
@keyframes spin {100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<div style="max-width:500px;margin:auto;padding:20px">

<h2>🚗 Jarvis AI Scanner</h2>

<input type="file" id="file" accept="application/pdf"><br><br>
<input type="file" id="img" accept="image/*"><br><br>

<textarea id="text" placeholder="Paste text..." style="width:100%;height:80px"></textarea>

<br><br>
<button class="glow" onclick="analyze()">Analyze</button>

<div id="loading" style="display:none"><div class="loader"></div></div>

<div id="result"></div>

<hr>

<input id="chat" placeholder="Ask something..." style="width:80%">
<button onclick="chat()">Send</button>

</div>

<script>
const API_KEY = "AIzaSyBh4nadOSEMhGfQhxcylpLTK2jd-5rA408";
const MODEL = "gemini-1.5-flash";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

let lastResult = "";

// ===== MAIN ANALYZE =====
async function analyze() {
const file = document.getElementById("file").files[0];
const img = document.getElementById("img").files[0];
const text = document.getElementById("text").value;

if (!file && !img && !text) {
alert("Give input!");
return;
}

document.getElementById("loading").style.display="block";

let extractedText = text;
let base64 = null;

try {

if (file) extractedText = await readPDF(file);
if (img) base64 = await toBase64(img);

const res = await callAI(extractedText, base64);

lastResult = res;
document.getElementById("result").innerHTML = res;

} catch(e) {
document.getElementById("result").innerHTML = "❌ ERROR: "+e.message;
}

document.getElementById("loading").style.display="none";
}

// ===== PDF =====
async function readPDF(file){
const buffer = await file.arrayBuffer();
const pdf = await pdfjsLib.getDocument({data:buffer}).promise;
let text="";
for(let i=1;i<=pdf.numPages;i++){
const page=await pdf.getPage(i);
const content=await page.getTextContent();
text+=content.items.map(x=>x.str).join(" ");
}
return text;
}

// ===== IMAGE =====
function toBase64(file){
return new Promise((res,rej)=>{
const reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>res(reader.result.split(",")[1]);
reader.onerror=rej;
});
}

// ===== AI CALL =====
async function callAI(text, img){

const body = {
contents:[{
parts:[
{ text: "You are Jarvis AI Car Expert.\nAnalyze:\n"+text }
]
}]
};

if(img){
body.contents[0].parts.push({
inlineData:{mimeType:"image/jpeg",data:img}
});
}

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(body)
});

const data = await res.json();

if(!res.ok){
console.error(data);
throw new Error(data.error?.message || "API failed");
}

return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

}

// ===== CHAT =====
async function chat(){
const q = document.getElementById("chat").value;
if(!q) return;

const res = await callAI("Context:"+lastResult+"\nQ:"+q);

document.getElementById("result").innerHTML += "<br><br><b>You:</b> "+q+"<br><b>Jarvis:</b> "+res;
document.getElementById("chat").value="";
}

</script>

</body>
</html>
